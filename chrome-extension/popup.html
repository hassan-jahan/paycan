<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larav12 Extension</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/icon48.png" alt="Logo" class="logo">
            <h1>Larav12</h1>
        </div>
        
        <!-- Login Form (shown by default) -->
        <div id="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <div class="error-message" id="login-error"></div>
            <button id="login-button" class="primary-button">Login</button>
            <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Register</a></p>
        </div>
        
        <!-- Register Form (hidden by default) -->
        <div id="register-form" style="display: none;">
            <h2>Register</h2>
            <div class="form-group">
                <label for="reg-name">Name</label>
                <input type="text" id="reg-name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Enter your password">
            </div>
            <div class="form-group">
                <label for="reg-password-confirm">Confirm Password</label>
                <input type="password" id="reg-password-confirm" placeholder="Confirm your password">
            </div>
            <div class="error-message" id="register-error"></div>
            <button id="register-button" class="primary-button">Register</button>
            <p class="toggle-text">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>
        
        <!-- Main Content (hidden by default) -->
        <div id="main-content" style="display: none;">
            <h2>Save Current URL</h2>
            <div class="url-container">
                <input type="text" id="current-url" readonly>
                <input type="text" id="url-title" placeholder="Enter a title for this URL">
            </div>
            <button id="save-url" class="primary-button">Save URL</button>
            <div class="success-message" id="save-success"></div>
            
            <h2>Saved URLs</h2>
            <div id="saved-urls-list" class="urls-list">
                <!-- URLs will be populated here -->
            </div>
            
            <button id="logout-button" class="secondary-button">Logout</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
